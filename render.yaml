services:
  - type: web
    name: asset-sync-api
    env: node
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: asset-sync-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

databases:
  - name: asset-sync-db
    plan: free
